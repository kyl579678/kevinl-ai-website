<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevin's AI Lab</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            text-align: center;
            color: white;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 3em;
            margin: 0;
            animation: fadeIn 1s ease-in;
        }
        p {
            font-size: 1.2em;
            margin-top: 10px;
            opacity: 0.9;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .demo-link {
            display: inline-block;
            margin-top: 24px;
            padding: 12px 32px;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.05em;
            font-weight: 600;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.25);
            transition: background 0.2s, transform 0.2s;
        }
        .demo-link:hover {
            background: rgba(255,255,255,0.35);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 我成功了！</h1>
        <p>kevinl-ai.com 正式上線</p>
        <p style="font-size: 0.9em; opacity: 0.7;">Powered by Cloudflare Tunnel</p>
        <a href="/frontend/defect-idoctor.html" class="demo-link">&#x1F52C; Defect iDoctor Demo</a>
    </div>
</body>
</html>
